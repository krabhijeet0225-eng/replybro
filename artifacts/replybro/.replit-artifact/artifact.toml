kind = "web"
previewPath = "/"
title = "ReplyBro"
version = "1.0.0"
id = "artifacts/replybro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20821

[services.development]
run = "pnpm --filter @workspace/replybro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/replybro", "run", "build" ]
publicDir = "artifacts/replybro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20821"
BASE_PATH = "/"
